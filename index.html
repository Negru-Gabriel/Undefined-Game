<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>UNDEFINED — there is no game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>" />
</head>
<body>
  <canvas id="gl"></canvas>

  <!-- TITLE -->
  <div id="title">
    <h1 class="title-logo">UNDEFINED<span class="strike"></span></h1>
    <div id="title-sub">there is no game · do not click anything</div>
    <div class="title-menu">
      <button id="title-start" class="gbtn">Do Not Begin</button>
      <button id="title-continue" class="gbtn" style="display:none">Continue</button>
      <button id="title-ach" class="gbtn">Achievements</button>
      <button id="title-settings" class="gbtn">Settings</button>
    </div>
    <div class="title-foot">an original meta-puzzle · headphones recommended</div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <span id="chap-label">—</span>
      <div class="corr-wrap">
        <span>CORRUPTION</span>
        <div class="corr-track"><div id="corr-fill"></div></div>
        <span id="corr-val">0%</span>
      </div>
    </div>
    <div class="hud-right">
      <div id="inv"></div>
      <button id="menu-btn" title="Menu (Esc)">≡</button>
    </div>
  </div>

  <!-- STAGE -->
  <div id="stage" class="stage"></div>

  <!-- DIALOGUE -->
  <div id="dialogue" class="dlg">
    <div class="dlg-box">
      <div id="dlg-name"></div>
      <div id="dlg-text"></div>
      <div id="dlg-continue">▾</div>
    </div>
  </div>
  <div id="choices"></div>

  <!-- OVERLAY (menus) -->
  <div id="overlay"></div>

  <script type="importmap">
  { "imports": { "three": "./vendor/three.module.js" } }
  </script>
  <script type="module" src="js/main.js"></script>
  <script>
    // Esc opens menu
    window.addEventListener('keydown', (e)=>{ if(e.key==='Escape' && window.__GAME && window.__GAME.running){ const ov=document.getElementById('overlay'); if(ov.classList.contains('visible')) window.__GAME.closeMenu(); else window.__GAME.openMenu(); }});
  </script>
</body>
</html>
